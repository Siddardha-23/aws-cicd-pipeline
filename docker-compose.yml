version: '3.8'
services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=opsboard
      - DB_USERNAME=opsboard
      - DB_PASSWORD=opsboard_dev_password
      - FLASK_SECRET_KEY=dev-secret-key-change-in-production
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=opsboard
      - POSTGRES_USER=opsboard
      - POSTGRES_PASSWORD=opsboard_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsboard"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
